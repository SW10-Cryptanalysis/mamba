name: PyTest

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Upgrade setuptools and pip
        run: uv pip install --system --upgrade "setuptools>=70.1" "pip>=24.0"
      
      - name: Install numpy first
        run: uv pip install --system numpy
      
      - name: Install dependencies
        run: |
          uv pip install --system causal-conv1d mamba-ssm --find-links https://github.com/state-spaces/mamba/releases/tag/v2.2.4
          uv pip install --system -e .

      - name: Run Pytest
        run: uv run pytest